<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Coldstone Soap Co. round serif S badge</title>
  <desc id="desc">A transparent worn gunmetal circular badge with a stamped serif S.</desc>
  <defs>
    <radialGradient id="face" cx="43%" cy="32%" r="78%">
      <stop offset="0" stop-color="#64615A"/>
      <stop offset=".36" stop-color="#242628"/>
      <stop offset=".72" stop-color="#0B0D0E"/>
      <stop offset="1" stop-color="#030404"/>
    </radialGradient>
    <linearGradient id="rim" x1="31" y1="23" x2="129" y2="139" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C8B17A"/>
      <stop offset=".22" stop-color="#6E7372"/>
      <stop offset=".55" stop-color="#1D2021"/>
      <stop offset=".78" stop-color="#8A6A38"/>
      <stop offset="1" stop-color="#2D2F30"/>
    </linearGradient>
    <clipPath id="coinClip">
      <circle cx="80" cy="80" r="67"/>
    </clipPath>
    <filter id="stoneTexture" x="0" y="0" width="160" height="160" filterUnits="userSpaceOnUse">
      <feTurbulence type="fractalNoise" baseFrequency=".82" numOctaves="5" seed="31"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .22"/>
      </feComponentTransfer>
    </filter>
    <filter id="stampShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="1.2" flood-color="#000000" flood-opacity=".9"/>
      <feDropShadow dx="0" dy="-1" stdDeviation=".45" flood-color="#F0E9DC" flood-opacity=".32"/>
    </filter>
  </defs>
  <circle cx="80" cy="80" r="70" fill="#060707" opacity=".92"/>
  <circle cx="80" cy="80" r="68" fill="url(#face)" stroke="url(#rim)" stroke-width="5"/>
  <g clip-path="url(#coinClip)">
    <rect x="12" y="12" width="136" height="136" filter="url(#stoneTexture)" opacity=".9"/>
    <path d="M24 104c25 10 54 12 95 3M33 48c22-6 50-9 92 2" fill="none" stroke="#F5F0E8" stroke-width="1.4" stroke-opacity=".08"/>
  </g>
  <circle cx="80" cy="80" r="57" fill="none" stroke="#A78E5D" stroke-opacity=".5" stroke-width="1.5"/>
  <circle cx="80" cy="80" r="48" fill="none" stroke="#F5F0E8" stroke-opacity=".13" stroke-width="1"/>
  <text x="80" y="106" text-anchor="middle" fill="#EEE6D8" font-family="Cinzel, Georgia, serif" font-size="86" font-weight="700" letter-spacing="-5" filter="url(#stampShadow)">S</text>
</svg>
